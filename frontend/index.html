<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визуализатор коммивояжёра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0E14;
            color: #E6E9EF;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: #0A0E14;
        }

        .bg-city {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, rgba(76, 201, 240, 0.6), rgba(76, 201, 240, 0));
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(76, 201, 240, 0.15);
            animation: cityPulse 4s ease-in-out infinite;
        }

        .bg-city::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(76, 201, 240, 0.3), transparent);
            animation: cityGlow 3s ease-in-out infinite alternate;
        }

        .bg-city:nth-child(odd) { animation-delay: 0.5s; }
        .bg-city:nth-child(3n) { animation-delay: 1s; }
        .bg-city:nth-child(5n+2) { animation-delay: 2s; }

        @keyframes cityPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.3); }
        }

        @keyframes cityGlow {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 0.6; transform: scale(1.5); }
        }

        .bg-line {
            position: absolute;
            height: 1.5px;
            background: linear-gradient(to right, transparent, rgba(76, 201, 240, 0.15), transparent);
            transform-origin: left center;
            animation: linePulse 6s ease-in-out infinite;
            border-radius: 2px;
        }

        .bg-line:nth-child(even) { animation-delay: 2s; }
        .bg-line:nth-child(3n+1) { animation-delay: 4s; }

        @keyframes linePulse {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.4; }
        }

        .mouse-glow {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(76, 201, 240, 0.06) 0%,
                rgba(76, 201, 240, 0.02) 40%,
                transparent 70%
            );
            transform: translate(-50%, -50%);
            transition: all 0.15s ease-out;
            filter: blur(20px);
            will-change: transform;
        }

        .mouse-glow-warm {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(74, 222, 128, 0.03) 0%,
                transparent 60%
            );
            transform: translate(-50%, -50%);
            transition: all 0.2s ease-out;
            filter: blur(40px);
            will-change: transform;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 480px;
            gap: 24px;
            background: rgba(16, 21, 28, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 30px 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .left {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 0;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
        }

        h1 span {
            background: linear-gradient(135deg, #4CC9F0, #4ADE80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #7C8798;
            font-size: 13px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .toolbar button {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #E6E9EF;
            padding: 7px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .toolbar button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .toolbar button.danger {
            border-color: #F2545B;
            color: #F2545B;
        }

        .toolbar button.danger:hover {
            background: rgba(242, 84, 91, 0.1);
        }

        .toolbar .counter {
            margin-left: auto;
            color: #7C8798;
            font-size: 13px;
        }

        .toolbar .counter strong {
            color: #E6E9EF;
        }

        canvas {
            width: 100%;
            height: auto;
            background: rgba(18, 22, 28, 0.9);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: crosshair;
            display: block;
            aspect-ratio: 800 / 600;
            position: relative;
            z-index: 2;
        }

        .hint {
            margin-top: 4px;
            color: #4E5867;
            font-size: 12px;
            text-align: center;
        }

        .status {
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #7C8798;
            font-size: 13px;
            min-height: 42px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status .info {
            color: #FFC65D;
        }
        .status .error {
            color: #F2545B;
        }

           /* ПРАВАЯ КОЛОНКА — МАТРИЦА */

        .right {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 0;
            overflow: hidden;
        }

        .matrix-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex: 1;
            overflow: hidden;
        }

        .matrix-container h2 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4E5867;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .matrix-container h2 .badge {
            font-size: 10px;
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 12px;
            border-radius: 12px;
            color: #4E5867;
        }

        .matrix-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 400px;
            max-width: 100%;
        }

        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            table-layout: auto;
        }

        .matrix-table th,
        .matrix-table td {
            padding: 4px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-width: 46px;
            font-size: 12px;
            white-space: nowrap;
        }

        .matrix-table th {
            background: rgba(255, 255, 255, 0.02);
            color: #4E5867;
            font-weight: 600;
            font-size: 11px;
        }

        .matrix-table td {
            color: #7C8798;
        }

        .matrix-table .diagonal {
            color: #2D3540;
        }

        .matrix-summary {
            margin-top: 10px;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #7C8798;
        }

        .matrix-summary .total {
            color: #4ADE80;
            font-weight: 700;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="bg-container" id="bgContainer"></div>

    <div class="mouse-glow" id="mouseGlow"></div>
    <div class="mouse-glow-warm" id="mouseGlowWarm"></div>

    <div class="container">
        <div class="left">
            <div>
                <h1>🗺️ TSP <span>Визуализатор</span></h1>
                <p class="subtitle">Кликни по карте, чтобы поставить город · справа матрица расстояний</p>
            </div>

            <div class="toolbar">
                <button id="clearBtn" class="danger">🗑 Очистить</button>
                <button id="randomBtn">🎲 5 случайных</button>
                <span class="counter">Городов: <strong id="cityCount">0</strong></span>
            </div>

            <canvas id="canvas" width="800" height="600"></canvas>

            <div class="hint">💡 Кликни на карту, чтобы добавить город</div>

            <div class="status" id="status">
                <span>💡</span> Кликни на карту, чтобы поставить первый город
            </div>
        </div>

        <div class="right">
            <div class="matrix-container">
                <h2>
                    📊 Матрица расстояний
                    <span class="badge" id="matrixBadge">0 городов</span>
                </h2>
                <div class="matrix-wrapper" id="matrixWrapper">
                    <div style="text-align:center;color:#2D3540;padding:20px;font-size:13px;">
                        // Добавьте города, чтобы увидеть матрицу
                    </div>
                </div>
                <div class="matrix-summary">
                    <span>📏 Сумма всех расстояний</span>
                    <span class="total" id="totalDistance">—</span>
                </div>
            </div>
        </div>
    </div>

    <script>


        // 1. СОСТОЯНИЕ

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');

        let cities = [];


        // 2. РАССТОЯНИЕ

        function distance(city1, city2) {
            return Math.sqrt((city1.x - city2.x) ** 2 + (city1.y - city2.y) ** 2);
        }


        // 3. ОТРИСОВКА КАРТЫ

        function draw() {
            ctx.clearRect(0, 0, 800, 600);

            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= 800; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, 600);
                ctx.stroke();
            }
            for (let y = 0; y <= 600; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(800, y);
                ctx.stroke();
            }

            cities.forEach((city, i) => {
                ctx.shadowColor = 'rgba(76, 201, 240, 0.2)';
                ctx.shadowBlur = 20;

                ctx.beginPath();
                ctx.arc(city.x, city.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = '#4CC9F0';
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.fillStyle = '#0A0E14';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(i + 1, city.x, city.y);
            });

            document.getElementById('cityCount').textContent = cities.length;
            renderMatrix();
        }


        // 4. МАТРИЦА РАССТОЯНИЙ

        function renderMatrix() {
            const wrapper = document.getElementById('matrixWrapper');
            const badge = document.getElementById('matrixBadge');
            const totalEl = document.getElementById('totalDistance');

            badge.textContent = `${cities.length} городов`;

            if (cities.length < 2) {
                wrapper.innerHTML = `
                    <div style="text-align:center;color:#2D3540;padding:20px;font-size:13px;">
                        // Добавьте минимум 2 города
                    </div>
                `;
                totalEl.textContent = '—';
                return;
            }

            const n = cities.length;
            let html = '<table class="matrix-table">';

            html += '<thead><tr><th>Города</th>';
            for (let i = 0; i < n; i++) {
                html += `<th>${i + 1}</th>`;
            }
            html += '</tr></thead>';

            html += '<tbody>';
            for (let i = 0; i < n; i++) {
                html += `<tr><th>${i + 1}</th>`;
                for (let j = 0; j < n; j++) {
                    let cellClass = '';
                    let value = '';

                    if (i === j) {
                        cellClass = 'diagonal';
                        value = '—';
                    } else {
                        const dist = distance(cities[i], cities[j]);
                        value = dist.toFixed(1);
                    }

                    html += `<td class="${cellClass}">${value}</td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';

            wrapper.innerHTML = html;

            let total = 0;
            for (let i = 0; i < n; i++) {
                for (let j = i + 1; j < n; j++) {
                    total += distance(cities[i], cities[j]);
                }
            }
            totalEl.textContent = total.toFixed(2);
        }


        // 5. ДОБАВЛЕНИЕ ГОРОДОВ

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            cities.push({ x, y });
            draw();

            statusEl.innerHTML = `<span class="info">📍</span> Добавлен город ${cities.length}`;
        });


        // 6. КНОПКИ

        document.getElementById('clearBtn').onclick = () => {
            cities = [];
            draw();
            statusEl.innerHTML = `<span>🗑</span> Все города удалены`;
        };

        document.getElementById('randomBtn').onclick = () => {
            cities = [];
            for (let i = 0; i < 5; i++) {
                cities.push({
                    x: 60 + Math.random() * 680,
                    y: 60 + Math.random() * 480
                });
            }
            draw();
            statusEl.innerHTML = `<span class="info">🎲</span> Сгенерировано 5 случайных городов`;
        };

        function createBgCities() {
            const container = document.getElementById('bgContainer');
            const numCities = 30;
            const numLines = 35;

            const bgCities = [];
            for (let i = 0; i < numCities; i++) {
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                bgCities.push({ x, y });

                const el = document.createElement('div');
                el.className = 'bg-city';
                el.style.left = x + '%';
                el.style.top = y + '%';
                el.style.animationDelay = (Math.random() * 4) + 's';
                container.appendChild(el);
            }

            for (let i = 0; i < numLines; i++) {
                const from = bgCities[Math.floor(Math.random() * bgCities.length)];
                const to = bgCities[Math.floor(Math.random() * bgCities.length)];

                if (from === to) continue;

                const dx = to.x - from.x;
                const dy = to.y - from.y;
                const length = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;

                const el = document.createElement('div');
                el.className = 'bg-line';
                el.style.left = from.x + '%';
                el.style.top = from.y + '%';
                el.style.width = length + '%';
                el.style.transform = `rotate(${angle}deg)`;
                el.style.transformOrigin = 'left center';
                el.style.animationDelay = (Math.random() * 6) + 's';
                container.appendChild(el);
            }
        }

        createBgCities();

        const glow = document.getElementById('mouseGlow');
        const glowWarm = document.getElementById('mouseGlowWarm');

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;

            glow.style.left = x + 'px';
            glow.style.top = y + 'px';

            glowWarm.style.left = x + 'px';
            glowWarm.style.top = y + 'px';
        });

        const bgContainer = document.getElementById('bgContainer');

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            bgContainer.style.transform = `translate(${x}px, ${y}px)`;
            bgContainer.style.transition = 'transform 0.5s ease-out';
        });

        // 7. СТАРТ

        draw();
        statusEl.innerHTML = `<span>💡</span> Кликни на карту, чтобы поставить первый город`;
    </script>

</body>
</html>
